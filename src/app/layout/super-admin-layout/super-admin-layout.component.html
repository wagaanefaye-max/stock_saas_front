  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button 
        pButton 
        icon="pi pi-bars" 
        class="p-button-text p-button-lg menu-toggle"
        (click)="toggleSidebar()"
        aria-label="Menu">
      </button>
      <h1 class="logo">Stock SaaS</h1>
      <span class="badge-super-admin">Super Admin</span>
    </div>
    
    <div class="header-right">
      <span *ngIf="authService.getCurrentUser()" class="user-name">
        {{ authService.getCurrentUser()?.name }}
      </span>
      <button 
        pButton 
        type="button" 
        icon="pi pi-sign-out" 
        label="Déconnexion"
        class="p-button-text"
        (click)="logout()">
      </button>
    </div>
  </header>

  <div class="layout-content">
    <!-- Sidebar -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <div class="sidebar-header">
          <h2>Administration</h2>
          <p class="text-muted">Plateforme</p>
        </div>
        <p-divider></p-divider>
        <ul class="nav-list">
          <li *ngFor="let item of menuItems">
            <a 
              [routerLink]="item.routerLink" 
              routerLinkActive="active"
              class="nav-item"
              [class.active]="router.url === item.routerLink">
              <i [class]="item.icon"></i>
              <span>{{ item.label }}</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Bottom Navigation Mobile -->
  <nav class="bottom-nav" *ngIf="menuItems.length > 0">
    <a 
      *ngFor="let item of menuItems" 
      [routerLink]="item.routerLink" 
      routerLinkActive="active"
      class="bottom-nav-item"
      [class.active]="router.url === item.routerLink"
      [title]="item.label">
      <i [class]="item['mobileIcon'] || item.icon"></i>
      <span class="nav-label">{{ item.label }}</span>
    </a>
    <button 
      class="bottom-nav-item logout-item"
      (click)="logout()"
      title="Déconnexion">
      <i class="pi pi-sign-out"></i>
      <span class="nav-label">Déconnexion</span>
    </button>
  </nav>
