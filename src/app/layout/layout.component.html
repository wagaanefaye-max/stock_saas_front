<div class="layout-container">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button 
        pButton 
        icon="pi pi-bars" 
        class="p-button-text p-button-lg menu-toggle"
        (click)="toggleSidebar()"
        aria-label="Menu">
      </button>
      <h1 class="logo">Stock SaaS</h1>
      <span *ngIf="authService.isSuperAdmin()" class="badge-super-admin">Super Admin</span>
    </div>
    
    <div class="header-right">
      <span *ngIf="authService.getCurrentUser()" class="user-name">
        {{ authService.getCurrentUser()?.name }}
      </span>
        <button 
          pButton 
          type="button" 
        icon="pi pi-sign-out" 
        label="Déconnexion"
          class="p-button-text"
        (click)="authService.logout(); router.navigate(['/login'])">
        </button>
    </div>
  </header>

  <div class="layout-content">
    <!-- Sidebar -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <ul class="nav-list">
          <li *ngFor="let item of menuItems">
            <a 
              [routerLink]="item.routerLink" 
              routerLinkActive="active"
              class="nav-item"
              [class.active]="router.url === item.routerLink">
              <i [class]="item.icon"></i>
              <span>{{ item.label }}</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Bottom Navigation Mobile -->
  <nav class="bottom-nav" *ngIf="menuItems.length > 0">
    <a 
      *ngFor="let item of menuItems" 
      [routerLink]="item.routerLink" 
      routerLinkActive="active"
      class="bottom-nav-item"
      [class.active]="router.url === item.routerLink">
      <i [class]="item.icon"></i>
      <span>{{ item.label }}</span>
    </a>
  </nav>
</div>
