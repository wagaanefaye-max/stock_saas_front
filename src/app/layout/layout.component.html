<div class="app-layout gestion-layout">
  <div class="app-body">
    <aside class="app-sidebar-desktop">
      <div class="app-sidebar__brand">
        <div class="app-sidebar__brand-mark" aria-hidden="true">
          <i class="pi pi-box"></i>
        </div>
        <div class="app-sidebar__brand-text">
          <span class="app-sidebar__app-name">Stock</span>
          <span *ngIf="authService.isGestionnaire()" class="app-sidebar__role-badge">Gestionnaire</span>
        </div>
      </div>
      <nav class="app-sidebar__nav" aria-label="Menu principal">
        <p class="app-sidebar__section-label">Navigation</p>
        <ul class="app-nav-desktop">
          <li *ngFor="let item of menuItems">
            <a [routerLink]="item.routerLink" routerLinkActive="active" class="app-nav-desktop__link">
              <span class="app-nav-desktop__icon" aria-hidden="true">
                <i [class]="item.icon"></i>
              </span>
              <span class="app-nav-desktop__label">{{ item.label }}</span>
            </a>
          </li>
        </ul>
      </nav>
      <div class="app-sidebar__footer" *ngIf="authService.getCurrentUser() as user">
        <div class="app-sidebar__user">
          <span class="app-sidebar__avatar" aria-hidden="true">{{ user.name.charAt(0) || '?' }}</span>
          <span class="app-sidebar__user-name">{{ user.name }}</span>
        </div>
        <button type="button" class="app-sidebar__logout" (click)="logout()" title="Déconnexion" aria-label="Déconnexion">
          <i class="pi pi-sign-out"></i>
        </button>
      </div>
    </aside>

    <main class="app-main">
      <router-outlet></router-outlet>
    </main>
  </div>

  <nav class="app-bottom-nav" aria-label="Navigation principale">
    <a
      *ngFor="let item of bottomNavItems"
      [routerLink]="item.routerLink"
      routerLinkActive="active"
      class="app-bottom-nav__item"
      [attr.aria-label]="item.label">
      <span class="app-bottom-nav__icon-wrap" aria-hidden="true">
        <i [class]="item.icon"></i>
      </span>
      <span class="app-bottom-nav__label">{{ item.label }}</span>
    </a>
    <button
      type="button"
      class="app-bottom-nav__item app-bottom-nav__item--more"
      (click)="mobileMenuOpen = true"
      aria-label="Plus de menus">
      <span class="app-bottom-nav__icon-wrap" aria-hidden="true">
        <i class="pi pi-ellipsis-h"></i>
      </span>
      <span class="app-bottom-nav__label">Plus</span>
    </button>
  </nav>

  <p-sidebar
    [(visible)]="mobileMenuOpen"
    position="bottom"
    styleClass="mobile-menu-drawer"
    [modal]="true"
    [dismissible]="true"
    [showCloseIcon]="true">
    <ng-template pTemplate="header">
      <div class="mobile-menu-drawer__header">
        <div class="mobile-menu-drawer__brand">
          <div class="app-sidebar__brand-mark" aria-hidden="true">
            <i class="pi pi-box"></i>
          </div>
          <div class="app-sidebar__brand-text">
            <span class="app-sidebar__app-name">Stock</span>
            <span *ngIf="authService.isGestionnaire()" class="app-sidebar__role-badge">Gestionnaire</span>
          </div>
        </div>
        <div class="mobile-menu-drawer__user" *ngIf="authService.getCurrentUser() as user">
          <span class="app-sidebar__avatar" aria-hidden="true">{{ user.name.charAt(0) || '?' }}</span>
          <span class="app-sidebar__user-name">{{ user.name }}</span>
        </div>
      </div>
    </ng-template>
    <ul class="mobile-menu-list">
      <li *ngFor="let item of moreMenuItems">
        <a [routerLink]="item.routerLink" routerLinkActive="active" (click)="closeMobileMenu()">
          <span class="mobile-menu-list__icon" aria-hidden="true">
            <i [class]="item.icon"></i>
          </span>
          <span>{{ item.label }}</span>
        </a>
      </li>
      <li>
        <button type="button" class="mobile-menu-logout" (click)="logout()">
          <span class="mobile-menu-list__icon" aria-hidden="true">
            <i class="pi pi-sign-out"></i>
          </span>
          <span>Déconnexion</span>
        </button>
      </li>
    </ul>
  </p-sidebar>
</div>
