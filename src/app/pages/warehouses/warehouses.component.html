<div class="warehouses-page mobile-page entity-page">
  
  <div class="page-header">
    <div>
      <h1>Entrepôts</h1>
      <p class="text-muted mobile-page__subtitle">Gérez vos entrepôts et leurs capacités</p>
    </div>
    <button 
      pButton 
      label="Nouvel entrepôt" 
      icon="pi pi-plus" 
      class="hide-mobile"
      (click)="openNew()"
      *ngIf="authService.isAdminEntreprise()">
    </button>
  </div>

  <!-- Admin entreprise -->
  <ng-container *ngIf="authService.isAdminEntreprise()">
    <div class="entity-filters">
      <div class="mobile-toolbar show-mobile-only">
        <span class="mobile-toolbar__search p-input-icon-left">
          <i class="pi pi-search"></i>
          <input
            type="text"
            pInputText
            [(ngModel)]="globalFilter"
            (ngModelChange)="onGlobalFilterChange()"
            placeholder="Nom, région…">
        </span>
      </div>
      <p-card class="table-card hide-mobile">
        <div class="list-toolbar">
          <div class="list-toolbar__primary">
            <span class="p-input-icon-left list-toolbar__search">
              <i class="pi pi-search"></i>
              <input
                type="text"
                pInputText
                [(ngModel)]="globalFilter"
                (ngModelChange)="onGlobalFilterChange()"
                placeholder="Nom, région…">
            </span>
          </div>
        </div>
      </p-card>
    </div>

    <div class="mobile-list show-mobile-only">
      <app-list-skeleton *ngIf="listLoading" [count]="4"></app-list-skeleton>

      <app-empty-state
        *ngIf="!listLoading && listLoadError"
        icon="pi pi-exclamation-triangle"
        message="Impossible de charger les entrepôts."
        actionLabel="Réessayer"
        actionIcon="pi pi-refresh"
        (action)="loadWarehouses()">
      </app-empty-state>

      <app-empty-state
        *ngIf="!listLoading && !listLoadError && filteredWarehouses.length === 0 && hasActiveFilters"
        icon="pi pi-filter-slash"
        message="Aucun entrepôt ne correspond à votre recherche."
        actionLabel="Réinitialiser la recherche"
        actionIcon="pi pi-refresh"
        (action)="resetFilters()">
      </app-empty-state>

      <app-empty-state
        *ngIf="!listLoading && !listLoadError && filteredWarehouses.length === 0 && !hasActiveFilters"
        icon="pi pi-building"
        message="Aucun entrepôt pour le moment. Créez votre premier dépôt."
        [actionLabel]="authService.isAdminEntreprise() ? 'Nouvel entrepôt' : ''"
        actionIcon="pi pi-plus"
        (action)="openNew()">
      </app-empty-state>

      <ul *ngIf="!listLoading && !listLoadError && filteredWarehouses.length > 0" class="mobile-list__items">
        <li *ngFor="let warehouse of paginatedWarehouses; trackBy: trackByWarehouseId" class="mobile-card">
          <div class="mobile-card__top">
            <div class="mobile-card__main">
              <span class="mobile-card__title">{{ warehouse.name }}</span>
              <span class="mobile-card__subtitle">{{ warehouse.region }}</span>
            </div>
            <p-tag
              [value]="warehouse.statusLabel || warehouse.status || 'N/A'"
              [severity]="getSeverity(warehouse.statusLabel || warehouse.status)">
            </p-tag>
          </div>
          <div class="mobile-card__stats mobile-card__stats--1">
            <div class="mobile-card__stat mobile-card__stat--wide">
              <span class="mobile-card__stat-label">Description</span>
              <span class="mobile-card__stat-value">{{ warehouse.description || '—' }}</span>
            </div>
          </div>
          <div class="card-actions-bar">
            <button
              pButton
              icon="pi pi-eye"
              class="p-button-outlined p-button-sm p-button-rounded p-button-icon-only"
              title="Voir détails"
              aria-label="Voir détails"
              (click)="viewWarehouseDetails(warehouse)">
            </button>
            <button
              pButton
              icon="pi pi-pencil"
              class="p-button-outlined p-button-sm p-button-rounded p-button-icon-only"
              title="Modifier"
              aria-label="Modifier"
              (click)="editWarehouse(warehouse)">
            </button>
            <button
              pButton
              [icon]="isWarehouseActive(warehouse) ? 'pi pi-ban' : 'pi pi-check-circle'"
              class="p-button-outlined p-button-sm p-button-rounded p-button-icon-only"
              [title]="isWarehouseActive(warehouse) ? 'Désactiver' : 'Activer'"
              [attr.aria-label]="isWarehouseActive(warehouse) ? 'Désactiver' : 'Activer'"
              (click)="toggleWarehouseStatus(warehouse)">
            </button>
            <button
              pButton
              icon="pi pi-trash"
              class="p-button-sm p-button-rounded p-button-icon-only card-actions-bar__danger"
              title="Supprimer"
              aria-label="Supprimer"
              (click)="deleteWarehouse(warehouse)">
            </button>
          </div>
        </li>
      </ul>

      <p-paginator
        *ngIf="!listLoading && !listLoadError && filteredWarehouses.length > 0"
        class="mobile-list__paginator entity-paginator"
        [rows]="rows"
        [totalRecords]="filteredWarehouses.length"
        [first]="first"
        (onPageChange)="onPageChange($event)"
        [showCurrentPageReport]="true"
        currentPageReportTemplate="{first} – {last} sur {totalRecords}"
        [rowsPerPageOptions]="[10, 20, 50]">
      </p-paginator>
    </div>
  </ng-container>

  <!-- Gestionnaires / utilisateurs -->
  <div *ngIf="!authService.isAdminEntreprise()" class="mobile-list show-mobile-only">
    <app-list-skeleton *ngIf="listLoading" [count]="4"></app-list-skeleton>

    <app-empty-state
      *ngIf="!listLoading && listLoadError"
      icon="pi pi-exclamation-triangle"
      message="Impossible de charger les entrepôts."
      actionLabel="Réessayer"
      actionIcon="pi pi-refresh"
      (action)="loadWarehouses()">
    </app-empty-state>

    <app-empty-state
      *ngIf="!listLoading && !listLoadError && warehouses.length === 0"
      icon="pi pi-building"
      message="Aucun entrepôt disponible pour le moment.">
    </app-empty-state>

    <ul *ngIf="!listLoading && !listLoadError && warehouses.length > 0" class="mobile-list__items">
      <li *ngFor="let warehouse of paginatedWarehousesNonAdmin; trackBy: trackByWarehouseId" class="mobile-card">
        <div class="mobile-card__top">
          <div class="mobile-card__main">
            <span class="mobile-card__title">{{ warehouse.name }}</span>
            <span class="mobile-card__subtitle">{{ warehouse.region }}</span>
          </div>
          <p-tag
            [value]="warehouse.statusLabel || warehouse.status || 'N/A'"
            [severity]="getSeverity(warehouse.statusLabel || warehouse.status)">
          </p-tag>
        </div>
        <div class="mobile-card__stats mobile-card__stats--1" *ngIf="warehouse.description">
          <div class="mobile-card__stat mobile-card__stat--wide">
            <span class="mobile-card__stat-label">Description</span>
            <span class="mobile-card__stat-value">{{ warehouse.description }}</span>
          </div>
        </div>
        <div class="card-actions-bar">
          <button
            pButton
            icon="pi pi-eye"
            class="p-button-outlined p-button-sm p-button-rounded p-button-icon-only"
            title="Voir détails"
            aria-label="Voir détails"
            (click)="viewWarehouseDetails(warehouse)">
          </button>
        </div>
      </li>
    </ul>

    <p-paginator
      *ngIf="!listLoading && !listLoadError && warehouses.length > 0"
      class="mobile-list__paginator entity-paginator"
      [rows]="rows"
      [totalRecords]="warehouses.length"
      [first]="first"
      (onPageChange)="onPageChange($event)"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="{first} – {last} sur {totalRecords}"
      [rowsPerPageOptions]="[10, 20, 50]">
    </p-paginator>
  </div>

  <button
    *ngIf="authService.isAdminEntreprise()"
    type="button"
    class="mobile-fab show-mobile-only"
    (click)="openNew()"
    aria-label="Nouvel entrepôt">
    <i class="pi pi-plus"></i>
  </button>

  <!-- Dialog pour créer/modifier un entrepôt (uniquement pour Admin Entreprise) -->
  <p-dialog 
    *ngIf="authService.isAdminEntreprise()"
    styleClass="app-mobile-dialog"
    [(visible)]="displayDialog" 
    [style]="dialogStyle"
    [breakpoints]="dialogBreakpoints"
    [header]="warehouse.id ? 'Modifier l\'entrepôt' : 'Nouvel entrepôt'"
    [modal]="true"
    [draggable]="false"
    [resizable]="false">

    <div class="app-dialog-form">
    <div class="form-group">
      <label>Nom de l'entrepôt *</label>
      <input type="text" pInputText [(ngModel)]="warehouse.name" class="w-full" placeholder="Ex: Entrepôt Central" required>
    </div>

    <div class="form-group">
      <label>Région *</label>
      <p-select 
        [(ngModel)]="warehouse.region" 
        [options]="regions" 
        placeholder="Sélectionner une région"
        class="w-full"
        [appendTo]="'body'"
        required>
      </p-select>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea 
        pInputText 
        [(ngModel)]="warehouse.description" 
        class="w-full" 
        rows="3"
        placeholder="Description de l'entrepôt (optionnel)">
      </textarea>
    </div>

    <div class="form-group">
      <label>Statut *</label>
      <p-select 
        [(ngModel)]="warehouse.statusCode" 
        [options]="statuses" 
        optionLabel="label"
        optionValue="value"
        placeholder="Sélectionner un statut"
        class="w-full"
        [appendTo]="'body'"
        required>
      </p-select>
    </div>
    </div>

    <ng-template pTemplate="footer">
      <button pButton label="Annuler" icon="pi pi-times" class="p-button-text" (click)="displayDialog = false"></button>
      <button pButton label="Enregistrer" icon="pi pi-check" (click)="saveWarehouse()" [disabled]="!isFormValid()"></button>
    </ng-template>
  </p-dialog>
</div>
