<div class="company-users-page mobile-page entity-page">
  <p-toast></p-toast>

  <div class="page-header">
    <div>
      <h1>Gestion des utilisateurs</h1>
      <p class="text-muted mobile-page__subtitle">Gérez les utilisateurs de votre entreprise</p>
    </div>
    <button
      pButton
      label="Nouvel utilisateur"
      icon="pi pi-plus"
      class="hide-mobile"
      (click)="openNew()">
    </button>
  </div>

  <div class="entity-filters">
    <div class="mobile-toolbar">
      <span class="mobile-toolbar__search p-input-icon-left">
        <i class="pi pi-search"></i>
        <input
          type="text"
          pInputText
          [(ngModel)]="globalFilter"
          (input)="onGlobalFilter()"
          placeholder="Nom ou email…">
      </span>
      <div class="mobile-toolbar__actions">
        <button
          pButton
          icon="pi pi-file-export"
          label="Exporter"
          class="p-button-secondary hide-mobile">
        </button>
      </div>
    </div>
  </div>

  <div class="mobile-list show-mobile-only">
    <div *ngIf="users.length === 0" class="mobile-list__empty">
      <i class="pi pi-users"></i>
      <p>Aucun utilisateur trouvé</p>
    </div>

    <ul *ngIf="users.length > 0" class="mobile-list__items">
      <li *ngFor="let user of users" class="mobile-card">
        <div class="mobile-card__top">
          <div class="mobile-card__main">
            <span class="mobile-card__title">{{ user.name }}</span>
            <span class="mobile-card__subtitle">{{ user.email }}</span>
          </div>
          <button
            pButton
            icon="pi pi-ellipsis-v"
            class="p-button-text p-button-rounded mobile-card__menu"
            (click)="showMenu($event, user)"
            aria-label="Actions">
          </button>
        </div>
        <div class="mobile-card__row">
          <p-tag [value]="getRoleLabel(user.roleCode)" [severity]="getRoleSeverity(user.roleCode)"></p-tag>
          <p-tag [value]="user.status" [severity]="getSeverity(user.status)"></p-tag>
        </div>
        <div class="mobile-card__footer">
          <span>Dernière connexion</span>
          <span>{{ formatDate(user.lastLogin) }}</span>
        </div>
      </li>
    </ul>

    <p-paginator
      *ngIf="totalRecords > 0"
      class="mobile-list__paginator entity-paginator"
      [rows]="size"
      [totalRecords]="totalRecords"
      [first]="page * size"
      (onPageChange)="onPageChange($event)"
      [showCurrentPageReport]="false"
      [rowsPerPageOptions]="[10, 20]">
    </p-paginator>
  </div>

  <p-menu #actionMenu [model]="menuItems" [popup]="true"></p-menu>

  <button
    type="button"
    class="mobile-fab show-mobile-only"
    (click)="openNew()"
    aria-label="Nouvel utilisateur">
    <i class="pi pi-plus"></i>
  </button>

  <p-dialog
    [(visible)]="displayDialog"
    styleClass="app-mobile-dialog"
    [style]="{width: '600px', maxWidth: '95vw'}"
    [header]="user.id ? 'Modifier l\'utilisateur' : 'Nouvel utilisateur'"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    [dismissableMask]="false">
    <div class="form-group">
      <label>Nom complet *</label>
      <input type="text" pInputText [(ngModel)]="user.name" class="w-full" required>
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" pInputText [(ngModel)]="user.email" class="w-full" required>
    </div>

    <div class="form-group">
      <label>Rôle *</label>
      <p-select
        [(ngModel)]="user.roleCode"
        [options]="roles"
        optionLabel="label"
        optionValue="value"
        placeholder="Sélectionner un rôle"
        class="w-full"
        required>
      </p-select>
    </div>
    <div class="form-group">
      <label>Statut *</label>
      <p-select
        [(ngModel)]="user.status"
        [options]="statuses"
        placeholder="Sélectionner un statut"
        class="w-full"
        required>
      </p-select>
    </div>
    <ng-template pTemplate="footer">
      <button pButton label="Annuler" icon="pi pi-times" class="p-button-text" (click)="displayDialog = false"></button>
      <button pButton label="Enregistrer" icon="pi pi-check" (click)="saveUser()" [disabled]="!isFormValid()"></button>
    </ng-template>
  </p-dialog>
</div>
