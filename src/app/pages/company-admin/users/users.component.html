<div class="company-users-page mobile-page entity-page">
  <p-toast></p-toast>

  <div class="page-header">
    <div>
      <h1>Gestion des utilisateurs</h1>
      <p class="text-muted mobile-page__subtitle">Gérez les utilisateurs de votre entreprise</p>
    </div>
    <button
      pButton
      label="Nouvel utilisateur"
      icon="pi pi-plus"
      class="hide-mobile"
      (click)="openNew()">
    </button>
  </div>

  <div class="entity-filters">
    <div class="mobile-toolbar show-mobile-only">
      <span class="mobile-toolbar__search p-input-icon-left">
        <i class="pi pi-search"></i>
        <input
          type="text"
          pInputText
          [(ngModel)]="globalFilter"
          (input)="onGlobalFilter()"
          placeholder="Nom ou email…">
      </span>
    </div>
    <p-card class="table-card hide-mobile">
      <div class="list-toolbar">
        <div class="list-toolbar__primary">
          <span class="p-input-icon-left list-toolbar__search">
            <i class="pi pi-search"></i>
            <input
              type="text"
              pInputText
              [(ngModel)]="globalFilter"
              (input)="onGlobalFilter()"
              placeholder="Nom ou email…">
          </span>
        </div>
      </div>
    </p-card>
  </div>

  <div class="mobile-list show-mobile-only">
    <div *ngIf="users.length === 0" class="mobile-list__empty">
      <i class="pi pi-users"></i>
      <p>Aucun utilisateur trouvé</p>
    </div>

    <ul *ngIf="users.length > 0" class="mobile-list__items">
      <li *ngFor="let user of users" class="mobile-card">
        <div class="mobile-card__top">
          <div class="mobile-card__main">
            <span class="mobile-card__title">{{ user.name }}</span>
            <span class="mobile-card__subtitle">{{ user.email }}</span>
          </div>
          <p-tag [value]="user.status" [severity]="getSeverity(user.status)"></p-tag>
        </div>
        <div class="mobile-card__stats mobile-card__stats--2">
          <div class="mobile-card__stat">
            <span class="mobile-card__stat-label">Rôle</span>
            <span class="mobile-card__stat-value">{{ getRoleLabel(user.roleCode) }}</span>
          </div>
          <div class="mobile-card__stat mobile-card__stat--wide">
            <span class="mobile-card__stat-label">Dernière connexion</span>
            <span class="mobile-card__stat-value">{{ formatDate(user.lastLogin) }}</span>
          </div>
        </div>
        <div class="card-actions-bar">
          <button
            pButton
            icon="pi pi-pencil"
            class="p-button-outlined p-button-sm p-button-rounded p-button-icon-only"
            title="Modifier"
            aria-label="Modifier"
            (click)="editUser(user)">
          </button>
          <button
            pButton
            [icon]="user.status === 'Actif' ? 'pi pi-ban' : 'pi pi-check-circle'"
            class="p-button-outlined p-button-sm p-button-rounded p-button-icon-only"
            [title]="user.status === 'Actif' ? 'Désactiver' : 'Activer'"
            [attr.aria-label]="user.status === 'Actif' ? 'Désactiver' : 'Activer'"
            (click)="toggleUserStatus(user)">
          </button>
          <button
            pButton
            icon="pi pi-trash"
            class="p-button-sm p-button-rounded p-button-icon-only card-actions-bar__danger"
            title="Supprimer"
            aria-label="Supprimer"
            (click)="deleteUser(user)">
          </button>
        </div>
      </li>
    </ul>

    <p-paginator
      *ngIf="totalRecords > 0"
      class="mobile-list__paginator entity-paginator"
      [rows]="size"
      [totalRecords]="totalRecords"
      [first]="page * size"
      (onPageChange)="onPageChange($event)"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="{first} – {last} sur {totalRecords}"
      [rowsPerPageOptions]="[10, 20, 50]">
    </p-paginator>
  </div>

  <button
    type="button"
    class="mobile-fab show-mobile-only"
    (click)="openNew()"
    aria-label="Nouvel utilisateur">
    <i class="pi pi-plus"></i>
  </button>

  <p-dialog
    [(visible)]="displayDialog"
    styleClass="app-mobile-dialog"
    [style]="dialogStyle"
    [breakpoints]="dialogBreakpoints"
    [header]="user.id ? 'Modifier l\'utilisateur' : 'Nouvel utilisateur'"
    [modal]="true"
    [draggable]="false"
    [resizable]="false">
    <div class="app-dialog-form">
    <div class="form-group">
      <label>Nom complet *</label>
      <input type="text" pInputText [(ngModel)]="user.name" class="w-full" required>
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" pInputText [(ngModel)]="user.email" class="w-full" required>
    </div>

    <div class="form-group">
      <label>Rôle *</label>
      <p-select
        [(ngModel)]="user.roleCode"
        [options]="roles"
        optionLabel="label"
        optionValue="value"
        placeholder="Sélectionner un rôle"
        class="w-full"
        required>
      </p-select>
    </div>
    <div class="form-group">
      <label>Statut *</label>
      <p-select
        [(ngModel)]="user.status"
        [options]="statuses"
        placeholder="Sélectionner un statut"
        class="w-full"
        required>
      </p-select>
    </div>
    </div>
    <ng-template pTemplate="footer">
      <button pButton label="Annuler" icon="pi pi-times" class="p-button-text" (click)="displayDialog = false"></button>
      <button pButton label="Enregistrer" icon="pi pi-check" (click)="saveUser()" [disabled]="!isFormValid()"></button>
    </ng-template>
  </p-dialog>
</div>
