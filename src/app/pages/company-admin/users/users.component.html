<div class="company-users-page">
  <p-toast></p-toast>
  
  <div class="page-header">
    <div>
      <h1>Gestion des utilisateurs</h1>
      <p class="text-muted">Gérez les utilisateurs de votre entreprise</p>
    </div>
    <button pButton label="Nouvel utilisateur" icon="pi pi-plus" (click)="openNew()"></button>
  </div>

  <p-card>
    <div class="list-toolbar">
      <div class="list-toolbar__primary">
        <span class="p-input-icon-left list-toolbar__search">
          <i class="pi pi-search"></i>
          <input
            type="text"
            pInputText
            [(ngModel)]="globalFilter"
            (input)="onGlobalFilter()"
            placeholder="Nom ou email…">
        </span>
      </div>
      <div class="list-toolbar__actions">
        <button
          pButton
          icon="pi pi-file-export"
          label="Exporter"
          class="p-button-secondary list-toolbar__btn-icon">
        </button>
      </div>
    </div>

    <p-table 
      [value]="users" 
      [paginator]="true" 
      [rows]="size"
      [totalRecords]="totalRecords"
      [lazy]="true"
      (onLazyLoad)="onPageChange($event)"
      [globalFilterFields]="['name','email']"
      [tableStyle]="{'min-width': '50rem'}"
      selectionMode="multiple"
      [(selection)]="selectedUsers"
      [rowHover]="true">
      
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 3rem">
            <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
          </th>
          <th pSortableColumn="name">Nom <p-sortIcon field="name"></p-sortIcon></th>
          <th pSortableColumn="email">Email <p-sortIcon field="email"></p-sortIcon></th>
          <th>Rôle</th>
          <th pSortableColumn="status">Statut <p-sortIcon field="status"></p-sortIcon></th>
          <th>Dernière connexion</th>
          <th style="width: 3rem">Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-user>
        <tr>
          <td>
            <p-tableCheckbox [value]="user"></p-tableCheckbox>
          </td>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>
            <p-tag [value]="getRoleLabel(user.roleCode)" [severity]="getRoleSeverity(user.roleCode)"></p-tag>
          </td>
          <td>
            <span class="text-muted">-</span>
          </td>
          <td>
            <p-tag [value]="user.status" [severity]="getSeverity(user.status)"></p-tag>
          </td>
          <td>{{ formatDate(user.lastLogin) }}</td>
          <td>
            <button 
              pButton 
              icon="pi pi-ellipsis-v" 
              class="p-button-text p-button-sm p-button-rounded action-menu-btn"
              (click)="showMenu($event, user)">
            </button>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>

  <p-menu #actionMenu [model]="menuItems" [popup]="true"></p-menu>

  <p-dialog 
    [(visible)]="displayDialog" 
    [style]="{width: '600px'}"
    [header]="user.id ? 'Modifier l\'utilisateur' : 'Nouvel utilisateur'"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    [dismissableMask]="false">
    <div class="form-group">
      <label>Nom complet *</label>
      <input type="text" pInputText [(ngModel)]="user.name" class="w-full" required>
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" pInputText [(ngModel)]="user.email" class="w-full" required>
    </div>

    <div class="form-group">
      <label>Rôle *</label>
      <p-select 
        [(ngModel)]="user.roleCode" 
        [options]="roles" 
        optionLabel="label"
        optionValue="value"
        placeholder="Sélectionner un rôle"
        class="w-full"
        required>
      </p-select>
    </div>
    <div class="form-group">
      <label>Statut *</label>
      <p-select 
        [(ngModel)]="user.status" 
        [options]="statuses" 
        placeholder="Sélectionner un statut"
        class="w-full"
        required>
      </p-select>
    </div>
    <ng-template pTemplate="footer">
      <button pButton label="Annuler" icon="pi pi-times" class="p-button-text" (click)="displayDialog = false"></button>
      <button pButton label="Enregistrer" icon="pi pi-check" (click)="saveUser()" [disabled]="!isFormValid()"></button>
    </ng-template>
  </p-dialog>
</div>
