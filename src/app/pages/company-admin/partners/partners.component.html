<div class="partners-page mobile-page entity-page">

  <div class="page-header">
    <div>
      <h1>Partenaires</h1>
      <p class="text-muted mobile-page__subtitle">Gérer vos clients et fournisseurs</p>
    </div>
    <div class="header-actions">
      <button
        pButton
        label="Nouveau partenaire"
        icon="pi pi-plus"
        class="p-button-sm partners-create-btn hide-mobile"
        (click)="openNew()">
      </button>
    </div>
  </div>

  <div class="entity-filters">
    <div class="mobile-toolbar show-mobile-only">
      <span class="p-input-icon-left mobile-toolbar__search">
        <i class="pi pi-search"></i>
        <input
          type="text"
          pInputText
          [(ngModel)]="globalFilter"
          (ngModelChange)="onSearchInput()"
          placeholder="Nom ou email…">
      </span>
    </div>

    <div class="mobile-toolbar__chips show-mobile-only list-filter-chips list-filter-chips--scroll">
      <p-selectButton
        [options]="roleFilterOptions"
        [(ngModel)]="selectedRoleFilter"
        optionLabel="label"
        optionValue="value"
        (ngModelChange)="onRoleFilterChange()">
      </p-selectButton>
    </div>

    <p-card class="table-card hide-mobile">
      <div class="list-toolbar">
        <div class="list-toolbar__primary">
          <span class="p-input-icon-left list-toolbar__search">
            <i class="pi pi-search"></i>
            <input
              type="text"
              pInputText
              [(ngModel)]="globalFilter"
              (ngModelChange)="onSearchInput()"
              placeholder="Nom ou email…">
          </span>
        </div>
        <div class="list-toolbar__filters list-toolbar__filters--inline">
          <div class="list-filter-chips">
            <p-selectButton
              [options]="roleFilterOptions"
              [(ngModel)]="selectedRoleFilter"
              optionLabel="label"
              optionValue="value"
              (ngModelChange)="onRoleFilterChange()">
            </p-selectButton>
          </div>
        </div>
      </div>
    </p-card>
  </div>

  <div class="mobile-list show-mobile-only">
    <app-list-skeleton *ngIf="listLoading" [count]="4"></app-list-skeleton>

    <app-empty-state
      *ngIf="!listLoading && listLoadError"
      icon="pi pi-exclamation-triangle"
      message="Impossible de charger les partenaires."
      actionLabel="Réessayer"
      actionIcon="pi pi-refresh"
      (action)="refreshPartners()">
    </app-empty-state>

    <app-empty-state
      *ngIf="!listLoading && !listLoadError && partners.length === 0 && hasActiveFilters"
      icon="pi pi-filter-slash"
      message="Aucun partenaire ne correspond à vos filtres."
      actionLabel="Réinitialiser les filtres"
      actionIcon="pi pi-refresh"
      (action)="resetFilters()">
    </app-empty-state>

    <app-empty-state
      *ngIf="!listLoading && !listLoadError && partners.length === 0 && !hasActiveFilters"
      icon="pi pi-users"
      message="Aucun partenaire pour le moment. Ajoutez vos clients et fournisseurs."
      actionLabel="Nouveau partenaire"
      actionIcon="pi pi-plus"
      (action)="openNew()">
    </app-empty-state>

    <ul *ngIf="!listLoading && !listLoadError && partners.length > 0" class="mobile-list__items">
      <li *ngFor="let p of partners; trackBy: trackByPartnerId" class="mobile-card">
        <div class="mobile-card__top">
          <div class="mobile-card__main">
            <span class="mobile-card__title">{{ p.name }}</span>
            <span class="mobile-card__subtitle">{{ p.email || '—' }}</span>
          </div>
          <p-tag [value]="getRoleLabel(p.role)" [severity]="getRoleSeverity(p.role)"></p-tag>
        </div>
        <div class="mobile-card__stats mobile-card__stats--2">
          <div class="mobile-card__stat">
            <span class="mobile-card__stat-label">Téléphone</span>
            <span class="mobile-card__stat-value">{{ (p.phone | phoneFormat) || '—' }}</span>
          </div>
          <div class="mobile-card__stat mobile-card__stat--wide">
            <span class="mobile-card__stat-label">Adresse</span>
            <span class="mobile-card__stat-value" [title]="p.address">{{ p.address || '—' }}</span>
          </div>
        </div>
        <div class="card-actions-bar">
          <button
            pButton
            icon="pi pi-pencil"
            class="p-button-outlined p-button-sm p-button-rounded p-button-icon-only"
            title="Modifier"
            aria-label="Modifier"
            (click)="editPartner(p)">
          </button>
          <button
            pButton
            icon="pi pi-trash"
            class="p-button-sm p-button-rounded p-button-icon-only card-actions-bar__danger"
            title="Supprimer"
            aria-label="Supprimer"
            (click)="deletePartner(p)">
          </button>
        </div>
      </li>
    </ul>

    <p-paginator
      *ngIf="!listLoading && !listLoadError && totalPartners > 0"
      class="mobile-list__paginator entity-paginator"
      [rows]="rows"
      [totalRecords]="totalPartners"
      [first]="first"
      (onPageChange)="onPartnersLazyLoad($event)"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="{first} – {last} sur {totalRecords}"
      [rowsPerPageOptions]="[10, 20, 50]">
    </p-paginator>
  </div>

  <button
    type="button"
    class="mobile-fab show-mobile-only"
    (click)="openNew()"
    aria-label="Nouveau partenaire">
    <i class="pi pi-plus"></i>
  </button>

  <p-dialog
    [(visible)]="displayDialog"
    styleClass="app-mobile-dialog"
    [header]="partner.id ? 'Modifier le partenaire' : 'Nouveau partenaire'"
    [modal]="true"
    [style]="dialogStyle"
    [breakpoints]="dialogBreakpoints"
    [draggable]="false"
    [resizable]="false"
    (onHide)="partner = {}">
    <div class="app-dialog-form">
    <div class="form-group">
      <label>Rôle *</label>
      <p-select [options]="roleOptions" [(ngModel)]="partner.role" optionLabel="label" optionValue="value" class="w-full" [disabled]="!!partner.id"></p-select>
    </div>
    <div class="form-group">
      <label>Nom *</label>
      <input type="text" pInputText [(ngModel)]="partner.name" class="w-full" placeholder="Nom ou raison sociale">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" pInputText [(ngModel)]="partner.email" class="w-full" placeholder="email@exemple.com">
    </div>
    <div class="form-group">
      <label>Téléphone</label>
      <input type="tel" pInputText [(ngModel)]="partner.phone" class="w-full" placeholder="78 900 88 77" appPhoneFormat maxlength="12">
    </div>
    <div class="form-group">
      <label>Adresse</label>
      <input type="text" pInputText [(ngModel)]="partner.address" class="w-full" placeholder="Adresse">
    </div>
    <div class="form-group">
      <label>Description / Notes</label>
      <textarea pInputText [(ngModel)]="partner.description" class="w-full" rows="2" placeholder="Notes optionnelles"></textarea>
    </div>
    </div>
    <ng-template pTemplate="footer">
      <button pButton label="Annuler" icon="pi pi-times" class="p-button-text" (click)="displayDialog = false"></button>
      <button pButton label="Enregistrer" icon="pi pi-check" (click)="savePartner()" [disabled]="!partner.name?.trim()"></button>
    </ng-template>
  </p-dialog>
</div>
