<div class="company-admin-dashboard">
  <div class="page-header">
    <h1>Tableau de bord - Administrateur</h1>
    <p class="text-muted">Vue d'ensemble de votre entreprise</p>
  </div>

  <!-- Statistiques -->
  <div class="stats-grid">
    <div *ngFor="let stat of stats" class="stat-card">
      <div class="stat-icon" [style.background-color]="stat.color + '20'">
        <i [class]="stat.icon" [style.color]="stat.color"></i>
      </div>
      <div class="stat-content">
        <p class="stat-title">{{ stat.title }}</p>
        <h2 class="stat-value">{{ stat.value }}</h2>
        <span class="stat-change">{{ stat.change }}</span>
      </div>
    </div>
  </div>

  <!-- Graphiques -->
  <div class="charts-grid">
    <p-card class="chart-card">
      <h3>Évolution des mouvements</h3>
      <p-chart type="line" [data]="chartData" [options]="chartOptions"></p-chart>
    </p-card>
  </div>
</div>
