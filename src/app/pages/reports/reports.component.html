<div class="reports-page">
  <div class="page-header">
    <div>
      <h1>Rapports</h1>
      <p class="text-muted">Analysez vos données et générez des rapports</p>
    </div>
    <button pButton label="Exporter PDF" icon="pi pi-file-pdf"></button>
  </div>

  <div class="reports-grid">
    <p-card class="report-card">
      <h3>Valeur du stock (12 mois)</h3>
      <p-chart type="line" [data]="chartData" [options]="chartOptions"></p-chart>
    </p-card>

    <p-card class="report-card">
      <h3>Top 5 produits</h3>
      <div class="top-products">
        <div *ngFor="let i of [1,2,3,4,5]" class="product-item">
          <div class="product-info">
            <span class="product-rank">#{{ i }}</span>
            <span class="product-name">Produit {{ i }}</span>
          </div>
          <span class="product-value">1,234 €</span>
        </div>
      </div>
    </p-card>

    <p-card class="report-card">
      <h3>Statistiques mensuelles</h3>
      <div class="stats-list">
        <div class="stat-row">
          <span>Mouvements totaux</span>
          <strong>456</strong>
        </div>
        <div class="stat-row">
          <span>Valeur moyenne</span>
          <strong>75,000 €</strong>
        </div>
        <div class="stat-row">
          <span>Produits actifs</span>
          <strong>1,234</strong>
        </div>
        <div class="stat-row">
          <span>Taux de rotation</span>
          <strong>2.5x</strong>
        </div>
      </div>
    </p-card>
  </div>
</div>
