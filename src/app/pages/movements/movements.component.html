<div class="movements-page">
  <div class="page-header">
    <div>
      <h1>Mouvements de stock</h1>
      <p class="text-muted">Suivez tous les mouvements d'entrée et de sortie</p>
    </div>
    <button pButton label="Nouveau mouvement" icon="pi pi-plus" (click)="openNew()"></button>
  </div>

  <p-card>
    <p-table 
      [value]="movements" 
      [paginator]="true" 
      [rows]="10"
      [tableStyle]="{'min-width': '50rem'}"
      [rowHover]="true">
      
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="date">Date <p-sortIcon field="date"></p-sortIcon></th>
          <th>Produit</th>
          <th>Type</th>
          <th pSortableColumn="quantity">Quantité <p-sortIcon field="quantity"></p-sortIcon></th>
          <th>Entrepôt</th>
          <th>Utilisateur</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-movement>
        <tr>
          <td>{{ movement.date }}</td>
          <td>{{ movement.product }}</td>
          <td>
            <p-tag [value]="movement.type" [severity]="getSeverity(movement.type)"></p-tag>
          </td>
          <td>{{ movement.quantity }}</td>
          <td>{{ movement.warehouse }}</td>
          <td>{{ movement.user }}</td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>

  <p-dialog 
    [(visible)]="displayDialog" 
    [style]="{width: '500px'}"
    header="Nouveau mouvement"
    [modal]="true"
    [draggable]="false"
    [resizable]="false">
    <div class="form-group">
      <label>Type</label>
      <p-dropdown 
        [(ngModel)]="movement.type" 
        [options]="types" 
        placeholder="Sélectionner un type"
        class="w-full">
      </p-dropdown>
    </div>
    <div class="form-group">
      <label>Produit</label>
      <input type="text" pInputText [(ngModel)]="movement.product" class="w-full">
    </div>
    <div class="form-group">
      <label>Quantité</label>
      <p-inputNumber [(ngModel)]="movement.quantity" [showButtons]="true" class="w-full"></p-inputNumber>
    </div>
    <div class="form-group">
      <label>Entrepôt</label>
      <input type="text" pInputText [(ngModel)]="movement.warehouse" class="w-full">
    </div>
    <ng-template pTemplate="footer">
      <button pButton label="Annuler" icon="pi pi-times" class="p-button-text" (click)="displayDialog = false"></button>
      <button pButton label="Enregistrer" icon="pi pi-check" (click)="saveMovement()"></button>
    </ng-template>
  </p-dialog>
</div>
