<div class="login-container">
  <p-toast></p-toast>
  <div class="login-wrapper">
    <!-- Left side - Branding -->
    <div class="login-branding">
      <div class="branding-content">
        <div class="logo-container">
          <img src="/assets/logo.jpg" alt="Stock SaaS" class="app-logo app-logo--auth-desktop" />
        </div>
        <h2>Gestion de Stock Multi-Entreprises</h2>
        <p class="branding-description">
          Gérez efficacement votre inventaire avec notre plateforme SaaS moderne et intuitive.
        </p>
        <div class="features-list">
          <div class="feature-item">
            <i class="pi pi-check-circle"></i>
            <span>Gestion multi-entreprises</span>
          </div>
          <div class="feature-item">
            <i class="pi pi-check-circle"></i>
            <span>Suivi en temps réel</span>
          </div>
          <div class="feature-item">
            <i class="pi pi-check-circle"></i>
            <span>Rapports détaillés</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right side - Login Form -->
    <div class="login-form-container">
      <div class="login-form-card">
        <!-- Mobile Logo -->
        <div class="mobile-logo">
          <img src="/assets/logo.jpg" alt="Stock SaaS" class="app-logo app-logo--auth-mobile" />
        </div>

        <div class="form-header">
          <h2>Connexion</h2>
          <p>Connectez-vous à votre compte</p>
        </div>

      <form (ngSubmit)="login()" class="login-form">
        <div class="form-group">
            <label for="email">
              <i class="pi pi-envelope"></i>
              Email
            </label>
          <input
            id="email"
            type="email" 
            pInputText
            [(ngModel)]="email" 
            name="email"
            placeholder="votre@email.com"
            class="w-full"
            required/>

        </div>

        <div class="form-group">
            <label for="password">
              <i class="pi pi-lock"></i>
              Mot de passe
            </label>
          <p-password 
            id="password"
            [(ngModel)]="password" 
            name="password"
            [feedback]="false"
            [toggleMask]="true"
            placeholder="••••••••"
            styleClass="w-full"
              [inputStyleClass]="'w-full'"
            required>
          </p-password>
        </div>

          <div class="form-options">
            <div class="remember-me">
              <p-checkbox [(ngModel)]="rememberMe" [binary]="true" name="rememberMe"></p-checkbox>
              <label for="rememberMe">Se souvenir de moi</label>
            </div>
            <a routerLink="/forgot-password" class="forgot-password">Mot de passe oublié ?</a>
          </div>

        <button 
          pButton 
          type="submit" 
          label="Se connecter"
          class="p-button-primary w-full login-button"
          [loading]="loading"
          [disabled]="loading || !email || !password">
        </button>
      </form>

        <div class="form-footer">
          <p>Vous n'avez pas de compte ? <a routerLink="/register">Créer un compte</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
