<div class="platform-users-page mobile-page entity-page">
  <p-toast></p-toast>

  <div class="page-header">
    <div>
      <h1>Utilisateurs de la plateforme</h1>
      <p class="text-muted mobile-page__subtitle">Gérez tous les utilisateurs de toutes les entreprises</p>
    </div>
    <button pButton label="Nouvel utilisateur" icon="pi pi-plus" class="hide-mobile" (click)="openNew()"></button>
  </div>

  <div class="entity-filters">
  <div class="mobile-toolbar">
    <div class="mobile-toolbar__search">
      <i class="pi pi-search"></i>
      <input
        type="text"
        pInputText
        [(ngModel)]="globalFilter"
        (input)="onGlobalFilter()"
        placeholder="Nom ou email…">
    </div>
  </div>
  </div>

  <div class="mobile-list show-mobile-only">
    <div *ngIf="users.length === 0" class="mobile-list__empty">
      <i class="pi pi-users"></i>
      <p>Aucun utilisateur trouvé</p>
    </div>

    <ul *ngIf="users.length > 0" class="mobile-list__items">
      <li *ngFor="let user of users" class="mobile-card">
        <div class="mobile-card__top">
          <div class="mobile-card__main">
            <span class="mobile-card__title">{{ user.name }}</span>
            <span class="mobile-card__subtitle">{{ user.email }}</span>
          </div>
        </div>
        <div class="mobile-card__row">
          <span class="text-muted">{{ user.companyName || '—' }}</span>
        </div>
        <div class="mobile-card__row">
          <p-tag [value]="user.roleLabel || getRoleLabel(user.roleCode)" severity="info"></p-tag>
          <p-tag [value]="user.status" [severity]="getSeverity(user.status)"></p-tag>
        </div>
        <div class="mobile-card__footer">
          <span>Dernière connexion</span>
          <span>{{ formatDate(user.lastLogin) }}</span>
        </div>
        <div class="card-actions-bar">
          <button
            pButton
            icon="pi pi-pencil"
            class="p-button-outlined p-button-sm p-button-rounded p-button-icon-only"
            title="Modifier"
            aria-label="Modifier"
            (click)="editUser(user)">
          </button>
          <button
            pButton
            [icon]="user.status === 'Actif' ? 'pi pi-ban' : 'pi pi-check-circle'"
            class="p-button-outlined p-button-sm p-button-rounded p-button-icon-only"
            [title]="user.status === 'Actif' ? 'Désactiver' : 'Activer'"
            [attr.aria-label]="user.status === 'Actif' ? 'Désactiver' : 'Activer'"
            (click)="toggleUserStatus(user)">
          </button>
          <button
            pButton
            icon="pi pi-trash"
            class="p-button-sm p-button-rounded p-button-icon-only card-actions-bar__danger"
            title="Supprimer"
            aria-label="Supprimer"
            (click)="deleteUser(user)">
          </button>
        </div>
      </li>
    </ul>

    <p-paginator
      *ngIf="totalRecords > 0"
      class="mobile-list__paginator entity-paginator"
      [rows]="size"
      [totalRecords]="totalRecords"
      [first]="page * size"
      (onPageChange)="onPageChange($event)"
      [showCurrentPageReport]="false">
    </p-paginator>
  </div>

  <button
    type="button"
    class="mobile-fab show-mobile-only"
    (click)="openNew()"
    aria-label="Nouvel utilisateur">
    <i class="pi pi-plus"></i>
  </button>

  <p-dialog
    styleClass="app-mobile-dialog"
    [(visible)]="displayDialog"
    [breakpoints]="dialogBreakpoints"
    [style]="dialogStyle"
    [header]="user.id ? 'Modifier l\'utilisateur' : 'Nouvel utilisateur'"
    [modal]="true"
    [draggable]="false"
    [resizable]="false">
    <div class="form-group">
      <label>Nom complet *</label>
      <input type="text" pInputText [(ngModel)]="user.name" class="w-full" required>
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" pInputText [(ngModel)]="user.email" class="w-full" required>
    </div>
    <div class="form-group" *ngIf="!user.id">
      <label>Mot de passe *</label>
      <p-password
        [(ngModel)]="user.password"
        [feedback]="false"
        [toggleMask]="true"
        placeholder="••••••••"
        styleClass="w-full"
        required>
      </p-password>
    </div>
    <div class="form-group">
      <label>Entreprise *</label>
      <p-select
        [(ngModel)]="user.entreprise"
        [options]="companies"
        optionLabel="name"
        optionValue="name"
        placeholder="Sélectionner une entreprise"
        class="w-full"
        required>
      </p-select>
    </div>
    <div class="form-group">
      <label>Rôle *</label>
      <p-select
        [(ngModel)]="user.role"
        [options]="roles"
        optionLabel="label"
        optionValue="value"
        placeholder="Sélectionner un rôle"
        class="w-full">
      </p-select>
    </div>
    <div class="form-group">
      <label>Statut</label>
      <p-select
        [(ngModel)]="user.status"
        [options]="statuses"
        placeholder="Sélectionner un statut"
        class="w-full">
      </p-select>
    </div>
    <ng-template pTemplate="footer">
      <button pButton label="Annuler" icon="pi pi-times" class="p-button-text" (click)="displayDialog = false"></button>
      <button pButton label="Enregistrer" icon="pi pi-check" (click)="saveUser()"></button>
    </ng-template>
  </p-dialog>
</div>
